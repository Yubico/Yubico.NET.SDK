name: Architecture Docs Monthly Synthesis

on:
  # GitHub schedules run only from the repository default branch. Keep this
  # yubikit workflow manually dispatchable; use a default-branch wrapper for cron.
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: architecture-docs-yubikit
  cancel-in-progress: false

jobs:
  synthesize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out yubikit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ref: yubikit

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: "10.0.x"

      - name: Install pinned Mermaid CLI
        shell: bash
        run: |
          version="$(sed -n 's/^MERMAID_CLI_VERSION="\(.*\)"/\1/p' scripts/architecture/architecture-images.env | head -n 1)"
          npm install -g "@mermaid-js/mermaid-cli@$version"
          bash scripts/architecture/render-architecture.sh --check

      - name: Fetch architecture baseline
        run: |
          git fetch origin +refs/heads/yubikit:refs/remotes/origin/yubikit

      - name: Build architecture context
        shell: bash
        run: |
          bash ./scripts/architecture/build-architecture-context.sh \
            --mode update \
            --v2-branch origin/yubikit \
            --base-range origin/yubikit~1..HEAD \
            --output-dir .architecture-context

      - name: Synthesize architecture documentation
        uses: anthropics/claude-code-action@28f83620103c48a57093dcc2837eec89e036bb9f # beta (v0.0.63)
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Read and follow `.github/prompts/architecture-docs-monthly-synthesis.md`.
            The generated context is in `.architecture-context/`.
            Improve only architecture documentation files.
          claude_args: >-
            --allowedTools Read,Grep,Glob,Edit,Write,Bash

      - name: Enforce architecture-only edits
        shell: bash
        run: |
          if ! git diff --quiet -- docs/architecture/.state.yml; then
            echo "Monthly synthesis must not edit docs/architecture/.state.yml." >&2
            exit 1
          fi
          outside="$(git status --porcelain --untracked-files=all | while IFS= read -r line; do path="${line#???}"; case "$path" in docs/architecture/*|.architecture-context/*) ;; *) printf '%s\n' "$path" ;; esac; done)"
          if [[ -n "$outside" ]]; then
            echo "Architecture docs automation edited files outside docs/architecture:" >&2
            printf '%s\n' "$outside" >&2
            exit 1
          fi

      - name: Render architecture images
        shell: bash
        run: |
          if git diff --quiet -- docs/architecture/sdk-architecture-diagrams.md; then
            echo "No Mermaid source changes; skipping render."
          else
            bash scripts/architecture/render-architecture.sh
          fi

      - name: Validate architecture documentation
        run: dotnet toolchain.cs -- docs-architecture

      - name: Create architecture synthesis PR
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          branch: automation/architecture-docs-monthly-synthesis
          base: yubikit
          title: Polish architecture documentation
          commit-message: "docs: polish architecture documentation"
          body: |
            Monthly synthesis pass for architecture documentation.

            Review for pedagogy, diagram clarity, evidence-map honesty, and rendered-image freshness.
          add-paths: |
            docs/architecture/
