name: Architecture Docs Preview

on:
  pull_request:
    branches: [ yubikit ]

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Fetch architecture baseline
        run: |
          git fetch origin +refs/heads/yubikit:refs/remotes/origin/yubikit

      - name: Build architecture context
        shell: bash
        run: |
          bash ./scripts/architecture/build-architecture-context.sh \
            --mode preview \
            --v2-branch origin/yubikit \
            --base-range origin/yubikit...HEAD \
            --output-dir .architecture-context

      - name: Comment with architecture documentation preview
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        uses: anthropics/claude-code-action@28f83620103c48a57093dcc2837eec89e036bb9f # beta (v0.0.63)
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Read and follow `.github/prompts/architecture-docs-pr-preview.md`.
            The generated context is in `.architecture-context/`.
            Preview mode must comment on architecture diagram impact only; do not edit files.
          claude_args: >-
            --allowedTools Read,Grep,Glob
