name: Build pull request

on:
  pull_request:
    branches:
      - main
      - 'develop**'
      - 'release**'
    paths:
      - '**.h'
      - '**.c'
      - '**.cs'
      - '**.csproj'
      - '**.sln'
      - '.github/workflows/build-pull-requests.yml'
      
permissions:
  contents: read

jobs:
  run-tests:
    name: Run tests
    # Requires write permissions to publish test results and coverage reports to PR
    permissions:
      pull-requests: write  # Required to comment on PRs with test results
      checks: write         # Required to create check runs for test results
      contents: read
      packages: read
    uses: ./.github/workflows/test.yml
    with:
      build-coverage-report: true
    
  build-artifacts:
    name: Build artifacts
    permissions:
      contents: read
      packages: read
    runs-on: windows-latest
    needs: run-tests
    
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5.2.0
        with:
          global-json-file: global.json

      - name: Register GitHub Packages NuGet source
        run: |
          dotnet nuget add source --username ${{ github.actor }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/Yubico/index.json"

      - name: Build Yubico.NET.SDK.sln
        run: dotnet build --configuration Release --nologo --verbosity minimal Yubico.NET.SDK.sln
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
      - name: Save build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: Nuget Packages Release
          path: |
            Yubico.Core/src/bin/Release/*.nupkg
            Yubico.YubiKey/src/bin/Release/*.nupkg

      - name: Save build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: Assemblies Release
          path: |
            Yubico.Core/src/bin/Release/**/*.dll
            Yubico.YubiKey/src/bin/Release/**/*.dll
