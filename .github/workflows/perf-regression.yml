name: Performance Regression

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'Yubico.Core/perf/**'
      - 'Yubico.Core/src/Yubico/Core/Devices/SmartCard/**'
      - '.github/workflows/perf-regression.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark:
    name: Run Performance Benchmarks
    runs-on: windows-latest
    permissions:
      contents: read
      packages: read
      pull-requests: write  # Required to comment on PRs with benchmark results

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5.2.0
        with:
          global-json-file: "./global.json"

      - name: Add local NuGet repository
        run: dotnet nuget add source --username ${{ github.actor }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/Yubico/index.json"

      - name: Build performance solution
        run: dotnet build Yubico.NET.SDK.Performance.sln --configuration Release --nologo --verbosity minimal

      - name: Run benchmarks
        run: |
          dotnet run --configuration Release --no-build --project Yubico.Core/perf/Yubico.Core.Performance.csproj -- --filter '*SmartCardListenerInvalidHandleBenchmark*' --exporters json
        continue-on-error: true
        id: benchmark-run

      - name: Parse benchmark results and verify thresholds
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          # Find the most recent BenchmarkDotNet results JSON
          $resultsFile = Get-ChildItem -Path "BenchmarkDotNet.Artifacts/results" -Filter "*-report-full.json" -Recurse |
                         Sort-Object LastWriteTime -Descending |
                         Select-Object -First 1

          if (-not $resultsFile) {
            Write-Error "No BenchmarkDotNet JSON results file found in BenchmarkDotNet.Artifacts/results/"
            exit 1
          }

          Write-Host "Parsing results from: $($resultsFile.FullName)"
          $results = Get-Content $resultsFile.FullName | ConvertFrom-Json

          # Extract the two benchmark results
          $benchmarks = $results.Benchmarks

          $legacyBenchmark = $benchmarks | Where-Object { $_.FullName -match "LegacyListener_InvocationsInOneSecond" }
          $fixedBenchmark = $benchmarks | Where-Object { $_.FullName -match "FixedListener_InvocationsInOneSecond" }

          if (-not $legacyBenchmark -or -not $fixedBenchmark) {
            Write-Error "Could not find both benchmark results in JSON output"
            Write-Host "Available benchmarks:"
            $benchmarks | ForEach-Object { Write-Host "  - $($_.FullName)" }
            exit 1
          }

          # The benchmark returns invocation counts as the measured value
          # Extract from the Statistics.Mean field (which is in nanoseconds for BDN, but our benchmark returns the count directly)
          # We need to look at the actual return values from the benchmark methods

          # BDN stores the actual return value in the Statistics, but we need to parse from the full results
          # The invocation counts are printed to console in GlobalCleanup, but also available via Statistics

          # For this benchmark, the Mean time is ~1 second (the observation window), but the critical metric
          # is the invocation count which we print to console. We'll parse the console output instead.

          # Actually, let's get the values from the Data column which contains the raw measurements
          Write-Host "Legacy benchmark: $($legacyBenchmark.FullName)"
          Write-Host "Fixed benchmark: $($fixedBenchmark.FullName)"

          # The actual invocation counts should be in the console output, but for robustness,
          # we can also examine the BDN output files. Let's check for the stdout file.

          $stdoutFile = Get-ChildItem -Path "BenchmarkDotNet.Artifacts/results" -Filter "*.log" -Recurse |
                        Sort-Object LastWriteTime -Descending |
                        Select-Object -First 1

          if (-not $stdoutFile) {
            Write-Warning "No log file found, attempting to extract from JSON statistics"
            # Fallback: use the baseline ratio if available
            $fixedResults = $results.Benchmarks | Where-Object { $_.FullName -match "FixedListener" }

            if ($fixedResults -and $fixedResults.Statistics) {
              Write-Host "Fixed benchmark statistics available"
              Write-Host ($fixedResults | ConvertTo-Json -Depth 5)
            }
          } else {
            Write-Host "Parsing console output from: $($stdoutFile.FullName)"
            $consoleOutput = Get-Content $stdoutFile.FullName -Raw

            # Extract the [FINAL] lines from GlobalCleanup
            if ($consoleOutput -match '\[FINAL\] Legacy invocations:\s*(\d+)') {
              $legacyInvocations = [int]$matches[1]
              Write-Host "Legacy invocations: $legacyInvocations"
            } else {
              Write-Error "Could not parse legacy invocation count from console output"
              exit 1
            }

            if ($consoleOutput -match '\[FINAL\] Fixed\s+invocations:\s*(\d+)') {
              $fixedInvocations = [int]$matches[1]
              Write-Host "Fixed invocations: $fixedInvocations"
            } else {
              Write-Error "Could not parse fixed invocation count from console output"
              exit 1
            }

            # Calculate the ratio
            if ($fixedInvocations -eq 0) {
              Write-Host "✅ PASS: Fixed implementation has zero invocations (infinite ratio)"
              $ratio = [double]::PositiveInfinity
            } else {
              $ratio = [double]$legacyInvocations / [double]$fixedInvocations
              Write-Host "Ratio (Legacy/Fixed): $ratio"
            }

            # Acceptance criterion: ratio must be >= 1000
            $THRESHOLD = 1000

            if ($ratio -ge $THRESHOLD) {
              Write-Host "✅ PASS: Ratio $ratio exceeds threshold of $THRESHOLD"
              Write-Host "The fix successfully reduces syscall invocations by ${ratio}x"
            } else {
              Write-Error "❌ FAIL: Ratio $ratio is below threshold of $THRESHOLD"
              Write-Host "Expected: Legacy/Fixed >= $THRESHOLD"
              Write-Host "Actual:   $legacyInvocations / $fixedInvocations = $ratio"
              exit 1
            }
          }

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: BenchmarkDotNet-Results
          path: BenchmarkDotNet.Artifacts/
          if-no-files-found: warn
