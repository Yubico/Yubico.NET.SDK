name: Test on Windows

on:
  workflow_dispatch:
  workflow_call:

jobs:
  test:
    name: Windows
    runs-on: windows-latest
    permissions:
      packages: read
      contents: read
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: "./global.json"
          dotnet-version: |
            6.0.x
            8.0.x

      - name: Add local NuGet repository
        run: dotnet nuget add source --username ${{ github.actor }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/Yubico/index.json"

      - name: Disable Strong Name Verification
        run: |
          # Try to find sn.exe in common locations
          $snPaths = @(
            "C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.8 Tools\x64\sn.exe",
            "C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.8 Tools\sn.exe",
            "C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.7.2 Tools\x64\sn.exe",
            "C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.7.2 Tools\sn.exe",
            "C:\Program Files (x86)\Microsoft SDKs\Windows\v8.1A\bin\NETFX 4.5.1 Tools\x64\sn.exe",
            "C:\Program Files (x86)\Microsoft SDKs\Windows\v7.0A\Bin\sn.exe",
            "C:\Program Files (x86)\Microsoft SDKs\Windows\v6.0A\Bin\sn.exe"
          )
          
          foreach ($path in $snPaths) {
            if (Test-Path $path) {
              Write-Host "Found sn.exe at: $path"
              & $path -Vr "Yubico.Core/src/bin/Debug/net47/Yubico.Core.dll"
              exit 0
            }
          }
          
          Write-Host "sn.exe not found in common locations, using generic command (may fail)"
          sn -Vr "Yubico.Core/src/bin/Debug/net47/Yubico.Core.dll"
        shell: pwsh

      - name: Build Yubico.Core
        run: dotnet build Yubico.Core/src/Yubico.Core.sln --configuration Debug

      - name: Test Yubico.YubiKey
        run: dotnet test Yubico.YubiKey/tests/unit/Yubico.YubiKey.UnitTests.csproj --logger trx --settings coverlet.runsettings.xml --collect:"XPlat Code Coverage"

      - name: Test Yubico.Core
        run: dotnet test Yubico.Core/tests/unit/Yubico.Core.UnitTests.csproj --logger trx --settings coverlet.runsettings.xml --collect:"XPlat Code Coverage"

      - name: Test Yubico.Core Integration tests (NET6)
        run: dotnet test Yubico.Core/tests/integration/Yubico.Core.IntegrationTests.csproj -f net6.0 --logger trx --settings coverlet.runsettings.xml --collect:"XPlat Code Coverage"

      - name: Test Yubico.Core Integration tests (NET8)
        run: dotnet test Yubico.Core/tests/integration/Yubico.Core.IntegrationTests.csproj -f net8.0 --logger trx --settings coverlet.runsettings.xml --collect:"XPlat Code Coverage"

      - name: Test Yubico.Core Integration Tests (NET47)
        run: dotnet test Yubico.Core/tests/integration/Yubico.Core.IntegrationTests.csproj -f net47 --logger trx --settings coverlet.runsettings.xml --collect:"XPlat Code Coverage"

      - name: Upload Test Result Files
        uses: actions/upload-artifact@v4
        with:
          name: TestResults-Windows
          path: '**/TestResults/*'